<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Terres des Voyageurs – Congés</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;1,400&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --sand: #E8D5B0; --sand-light: #F5ECD8; --sand-dark: #C9AD80;
  --earth: #C8633A; --earth-dark: #A84E28; --earth-mid: #D4764D;
  --green: #4A6741; --green-light: #6B8F63;
  --sky: #6B8FA8; --sky-light: #EEF4F8;
  --warm-white: #FDFAF5; --text: #2C1F0E; --text-soft: #7A6050;
  --shadow: rgba(90,50,20,0.13);
  --danger: #C0392B; --danger-light: #FDECEA;
  --success: #27AE60; --success-light: #E8F8EF;
  --warning: #E67E22; --warning-light: #FEF4E6;
  --border: rgba(139,94,60,0.12);
  --radius: 14px;
}
*, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
body { font-family:'DM Sans',sans-serif; background:var(--warm-white); color:var(--text); min-height:100vh; }

/* ── HEADER ── */
header {
  background:#C8633A; color:var(--sand-light);
  padding:0 32px; height:68px;
  display:flex; align-items:center; justify-content:space-between;
  border-bottom:3px solid #D4764D;
  position:sticky; top:0; z-index:50;
}
.logo { display:flex; align-items:center; gap:12px; }
.logo svg { width:38px; height:38px; flex-shrink:0; }
.logo-text h1 { font-family:'Playfair Display',serif; font-size:17px; font-weight:600; line-height:1.1; }
.logo-text small { font-size:9.5px; font-weight:300; letter-spacing:2.8px; text-transform:uppercase; opacity:0.6; display:block; }
.header-right { display:flex; align-items:center; gap:10px; }
.pill { background:rgba(255,255,255,0.1); border:1px solid rgba(255,255,255,0.18); padding:5px 13px; border-radius:20px; font-size:11.5px; font-weight:500; letter-spacing:0.6px; }
.hbtn { background:rgba(255,255,255,0.13); border:1px solid rgba(255,255,255,0.22); padding:6px 14px; border-radius:20px; font-size:11.5px; cursor:pointer; color:var(--sand-light); font-family:'DM Sans',sans-serif; font-weight:500; transition:background 0.2s; display:flex; align-items:center; gap:6px; }
.hbtn:hover { background:rgba(255,255,255,0.22); }
.sync-dot { width:7px; height:7px; border-radius:50%; background:#5dbe85; display:inline-block; animation:blink 2.2s infinite; }
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.3} }

/* ── LAYOUT ── */
.container { max-width:1140px; margin:0 auto; padding:32px 22px 70px; }
.year-nav { display:flex; align-items:center; gap:14px; margin-bottom:28px; }
.year-nav h2 { font-family:'Playfair Display',serif; font-size:26px; font-weight:400; color:var(--earth-dark); }
.yn-btn { background:var(--sand-light); border:1px solid var(--sand-dark); width:32px; height:32px; border-radius:50%; cursor:pointer; font-size:15px; color:var(--earth); display:flex; align-items:center; justify-content:center; transition:background 0.18s; }
.yn-btn:hover { background:var(--sand); }

/* ── STAFF GRID ── */
.staff-grid { display:grid; grid-template-columns:repeat(auto-fill, minmax(440px, 1fr)); gap:22px; margin-bottom:30px; }
@media(max-width:520px){ .staff-grid { grid-template-columns:1fr; } header { padding:0 14px; } .container { padding:18px 10px 50px; } }

/* ── CARD ── */
.card { background:#fff; border-radius:var(--radius); box-shadow:0 2px 18px var(--shadow); border:1px solid var(--border); overflow:hidden; }
.card-head { padding:18px 22px 14px; border-bottom:1px solid var(--sand-light); display:flex; align-items:center; gap:14px; }
.avatar { width:46px; height:46px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-family:'Playfair Display',serif; font-size:18px; font-weight:600; color:#fff; flex-shrink:0; }
.staff-meta h3 { font-size:16px; font-weight:600; color:var(--earth-dark); display:flex; align-items:center; gap:7px; }
.staff-meta p { font-size:12px; color:var(--text-soft); margin-top:2px; }
.card-actions { margin-left:auto; display:flex; gap:6px; }
.icon-btn { background:none; border:none; cursor:pointer; padding:5px; border-radius:7px; font-size:14px; opacity:0.45; transition:all 0.15s; }
.icon-btn:hover { opacity:1; background:var(--sand-light); }

/* ── QUOTA ── */
.quota-area { padding:16px 22px; border-bottom:1px solid var(--sand-light); }
.q-label { display:flex; justify-content:space-between; align-items:center; margin-bottom:6px; font-size:11.5px; font-weight:500; color:var(--text-soft); text-transform:uppercase; letter-spacing:0.7px; }
.q-count { font-size:13px; font-weight:600; color:var(--earth-dark); }
.bar { height:7px; background:var(--sand-light); border-radius:4px; overflow:hidden; }
.bar-fill { height:100%; border-radius:4px; transition:width 0.5s ease; }
.badge { display:inline-flex; align-items:center; gap:4px; padding:3px 10px; border-radius:12px; font-size:11px; font-weight:600; margin-top:5px; }
.badge-ok { background:var(--success-light); color:var(--success); }
.badge-warn { background:var(--warning-light); color:var(--warning); }
.badge-no { background:var(--danger-light); color:var(--danger); }

/* ── PERIODS ── */
.periods-area { padding:14px 22px 18px; }
.sec-title { font-size:10.5px; font-weight:600; text-transform:uppercase; letter-spacing:0.9px; color:var(--text-soft); margin-bottom:9px; margin-top:14px; }
.sec-title:first-child { margin-top:0; }
.period-row { display:flex; align-items:center; gap:8px; padding:7px 11px; background:var(--sand-light); border-radius:9px; margin-bottom:5px; font-size:12.5px; }
.period-row.ferie-row { background:var(--sky-light); }
.period-row.manual-row { background:#F0EBF8; }
.p-dates { font-weight:500; color:var(--earth-dark); flex:1; min-width:0; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.p-count { font-size:11.5px; color:var(--text-soft); white-space:nowrap; }
.del-btn { background:none; border:none; cursor:pointer; font-size:13px; color:var(--text-soft); opacity:0.4; padding:2px 5px; border-radius:5px; transition:all 0.15s; flex-shrink:0; }
.del-btn:hover { opacity:1; color:var(--danger); background:var(--danger-light); }
.empty-note { font-size:12px; color:var(--text-soft); font-style:italic; opacity:0.65; padding:3px 0 6px; }
.add-row { display:flex; gap:7px; margin-top:8px; }
.add-btn { flex:1; background:none; border:1.5px dashed; padding:7px 10px; border-radius:9px; font-size:12px; font-family:'DM Sans',sans-serif; font-weight:500; cursor:pointer; display:flex; align-items:center; justify-content:center; gap:5px; transition:all 0.18s; }
.add-cp { border-color:var(--earth-mid); color:var(--earth); }
.add-cp:hover { background:var(--sand-light); border-color:var(--earth); }
.add-ferie { border-color:var(--sky); color:var(--sky); }
.add-ferie:hover { background:var(--sky-light); }
.add-manual { border-color:#9B7FC0; color:#7B5FA0; }
.add-manual:hover { background:#F4EFF9; }

/* ── ADD STAFF CARD ── */
.add-staff-card { background:transparent; border:2px dashed var(--sand-dark); border-radius:var(--radius); display:flex; flex-direction:column; align-items:center; justify-content:center; gap:10px; padding:36px 20px; cursor:pointer; transition:all 0.2s; min-height:160px; }
.add-staff-card:hover { background:var(--sand-light); border-color:var(--earth-mid); }
.add-staff-card span { font-size:13px; color:var(--text-soft); font-weight:500; }
.add-staff-icon { font-size:28px; opacity:0.5; }

/* ── MODAL ── */
.overlay { display:none; position:fixed; inset:0; background:rgba(44,31,14,0.52); z-index:200; align-items:center; justify-content:center; backdrop-filter:blur(3px); padding:16px; }
.overlay.open { display:flex; }
.modal { background:#fff; border-radius:18px; padding:28px; width:100%; max-width:480px; max-height:90vh; overflow-y:auto; box-shadow:0 28px 60px rgba(44,31,14,0.22); position:relative; animation:mIn 0.22s ease; }
@keyframes mIn { from{transform:translateY(10px) scale(0.97);opacity:0} to{transform:none;opacity:1} }
.modal-close { position:absolute; top:14px; right:14px; background:var(--sand-light); border:none; width:28px; height:28px; border-radius:50%; cursor:pointer; font-size:14px; color:var(--earth-dark); display:flex; align-items:center; justify-content:center; }
.modal h3 { font-family:'Playfair Display',serif; font-size:19px; color:var(--earth-dark); margin-bottom:3px; padding-right:30px; }
.modal-sub { font-size:12.5px; color:var(--text-soft); margin-bottom:18px; }
.info-box { background:var(--sand-light); border-radius:9px; padding:9px 13px; font-size:12.5px; color:var(--text-soft); margin-bottom:14px; }
.info-box strong { color:var(--earth-dark); }
.err { background:var(--danger-light); color:var(--danger); padding:9px 13px; border-radius:8px; font-size:12.5px; margin-bottom:12px; display:none; }
.fg { margin-bottom:14px; }
.fg label { display:block; font-size:11px; font-weight:600; text-transform:uppercase; letter-spacing:0.7px; color:var(--text-soft); margin-bottom:5px; }
.fg input, .fg select { width:100%; padding:9px 13px; border:1.5px solid var(--sand-dark); border-radius:9px; font-family:'DM Sans',sans-serif; font-size:13.5px; color:var(--text); background:var(--warm-white); outline:none; transition:border-color 0.18s; }
.fg input:focus, .fg select:focus { border-color:var(--earth); }
.fg-row { display:grid; grid-template-columns:1fr 1fr; gap:10px; }
.modal-actions { display:flex; gap:9px; margin-top:4px; }
.btn-cancel { flex:1; padding:10px; border:1.5px solid var(--sand-dark); background:none; border-radius:9px; font-family:'DM Sans',sans-serif; font-size:13px; font-weight:500; cursor:pointer; color:var(--text-soft); transition:background 0.18s; }
.btn-cancel:hover { background:var(--sand-light); }
.btn-ok { flex:2; padding:10px; border:none; border-radius:9px; font-family:'DM Sans',sans-serif; font-size:13px; font-weight:600; cursor:pointer; color:#fff; transition:opacity 0.18s; }
.btn-ok:hover { opacity:0.88; }

/* ── HOLIDAYS LIST ── */
.hol-list { border:1.5px solid var(--sand-dark); border-radius:9px; background:var(--warm-white); max-height:210px; overflow-y:auto; }
.hol-opt { display:flex; align-items:center; gap:9px; padding:8px 13px; border-bottom:1px solid var(--sand-light); cursor:pointer; transition:background 0.13s; font-size:12.5px; }
.hol-opt:last-child { border-bottom:none; }
.hol-opt:hover:not(.disabled) { background:var(--sand-light); }
.hol-opt.disabled { opacity:0.4; pointer-events:none; }
.hol-opt input[type=checkbox] { accent-color:var(--sky); width:14px; height:14px; flex-shrink:0; cursor:pointer; }
.hol-name { flex:1; }
.hol-date { font-size:11.5px; color:var(--text-soft); white-space:nowrap; }
.color-grid { display:grid; grid-template-columns:repeat(8,1fr); gap:8px; margin-top:4px; }
.color-swatch { width:32px; height:32px; border-radius:50%; cursor:pointer; border:3px solid transparent; transition:transform 0.15s, border-color 0.15s; }
.color-swatch:hover { transform:scale(1.15); }
.color-swatch.selected { border-color:var(--text); }

/* ── CALENDAR ── */
.cal-card { background:#fff; border-radius:var(--radius); box-shadow:0 2px 18px var(--shadow); border:1px solid var(--border); overflow:hidden; margin-top:6px; }
.cal-head { padding:18px 24px 14px; border-bottom:1px solid var(--sand-light); display:flex; align-items:flex-start; justify-content:space-between; gap:12px; flex-wrap:wrap; }
.cal-head h3 { font-family:'Playfair Display',serif; font-size:19px; color:var(--earth-dark); }
.legend { display:flex; flex-wrap:wrap; gap:10px; margin-top:4px; }
.leg-item { display:flex; align-items:center; gap:5px; font-size:11.5px; color:var(--text-soft); }
.leg-dot { width:9px; height:9px; border-radius:50%; flex-shrink:0; }
.months-grid { display:grid; grid-template-columns:repeat(4,1fr); }
@media(max-width:800px){ .months-grid { grid-template-columns:repeat(2,1fr); } }
.month-block { padding:14px 16px; border-right:1px solid var(--sand-light); border-bottom:1px solid var(--sand-light); }
.month-block:nth-child(4n){ border-right:none; }
.month-block:nth-last-child(-n+4){ border-bottom:none; }
.m-name { font-size:11px; font-weight:600; text-transform:uppercase; letter-spacing:1px; color:var(--text-soft); margin-bottom:7px; }
.days-row { display:grid; grid-template-columns:repeat(7,1fr); gap:1px; }
.dh { font-size:8.5px; text-align:center; color:var(--text-soft); opacity:0.55; font-weight:600; padding-bottom:3px; }
.dc { width:100%; aspect-ratio:1; display:flex; align-items:center; justify-content:center; font-size:9.5px; border-radius:50%; position:relative; }
.dc.today { font-weight:700; border:1.5px solid var(--earth); }
.dc.wknd { opacity:0.3; }
/* ferie rings now handled inline per staff color */

/* ── SECTION TITLE ── */
.s-title { font-family:'Playfair Display',serif; font-size:21px; color:var(--earth-dark); margin-bottom:14px; font-weight:400; }

/* ── TOAST ── */
.toast { position:fixed; bottom:22px; right:22px; background:var(--earth-dark); color:var(--sand-light); padding:11px 18px; border-radius:11px; font-size:12.5px; font-weight:500; z-index:300; opacity:0; transform:translateY(6px); transition:all 0.28s; pointer-events:none; }
.toast.show { opacity:1; transform:none; }

/* ── LOADING ── */
.loading { display:flex; flex-direction:column; align-items:center; justify-content:center; min-height:55vh; gap:14px; }
.spinner { width:36px; height:36px; border:3px solid var(--sand); border-top-color:var(--earth); border-radius:50%; animation:spin 0.75s linear infinite; }
@keyframes spin { to{transform:rotate(360deg)} }
</style>
</head>

function easterDate(y) {
  const a=y%19,b=Math.floor(y/100),c=y%100,d=Math.floor(b/4),e=b%4,
        f=Math.floor((b+8)/25),g=Math.floor((b-f+1)/3),
        h=(19*a+b-d-g+15)%30,i=Math.floor(c/4),k=c%4,
        l=(32+2*e+2*i-h-k)%7,m=Math.floor((a+11*h+22*l)/451),
        mo=Math.floor((h+l-7*m+114)/31),dy=((h+l-7*m+114)%31)+1;
  // Return as ISO string directly to avoid any timezone issues
  return dt(y, mo, dy);
}
// Safe ISO date from local year/month/day — no timezone shift
function dt(y,m,d){
  return String(y)+'-'+String(m).padStart(2,'0')+'-'+String(d).padStart(2,'0');
}
// Add n days to an ISO date string, returns ISO string
function addD(isoStr, n){
  const parts = isoStr.split('-');
  const date = new Date(Number(parts[0]), Number(parts[1])-1, Number(parts[2]));
  date.setDate(date.getDate()+n);
  return dt(date.getFullYear(), date.getMonth()+1, date.getDate());
}
// fmtISO still needed for the day-map loop — keep safe version
function fmtISO(d){
  return dt(d.getFullYear(), d.getMonth()+1, d.getDate());
}

function getSD(staffId) {
  if (!state.data[staffId]) state.data[staffId] = {};
  if (!state.data[staffId][year]) state.data[staffId][year] = {cp:[],feries:[]};
  return state.data[staffId][year];
}

// ferieSet = Set of ISO date strings to exclude (staff's own feries)
function workdays(s, e, ferieSet) {
  const fs = ferieSet || new Set();
  let n=0, c=new Date(s+'T00:00:00'), end=new Date(e+'T00:00:00');
  while(c<=end){
    const dow=c.getDay();
    const iso=c.toISOString().split('T')[0];
    if(dow!==0 && dow!==6 && !fs.has(iso)) n++;
    c.setDate(c.getDate()+1);
  }
  return n;
}

// Build a Set of ferie dates for a given staff+year
function ferieSet(staffId) {
  const d = getSD(staffId);
  return new Set(d.feries.map(f => f.date));
}

function totalCP(periods, fs){ return periods.reduce((a,p)=>a+workdays(p.start,p.end,fs),0); }

function fmt(str){
  return new Date(str+'T00:00:00').toLocaleDateString('fr-FR',{day:'numeric',month:'short'});
}

function countryName(code){
  const c=COUNTRY_LIST.find(x=>x.code===code);
  return c ? c.name : code;

function badgeHtml(used, max) {
  const left=max-used;
  if(used===0) return `<span class="badge badge-no">⏳ Aucun congé planifié</span>`;
  if(used>=max) return `<span class="badge badge-ok">✓ Quota complet</span>`;
  if(used/max>=0.5) return `<span class="badge badge-ok">✓ ${left}j restant${left>1?'s':''}</span>`;
  return `<span class="badge badge-warn">⚠️ ${left}j restant${left>1?'s':''} à planifier</span>`;
}

function errShow(msg){ const e=document.getElementById('mErr'); e.textContent=msg; e.style.display='block'; }

function toast(msg){

      <div class="period-row">
        <span class="period-row-icon">📅</span>
        <span class="p-dates">${fmt(p.start)} → ${fmt(p.end)}</span>
        <span class="p-count" title="Week-ends et jours fériés exclus">${workdays(p.start,p.end,fs)}j ouvrés</span>
        <button class="del-btn" onclick="delCP('${s.id}',${i})">✕</button>
      </div>`).join('') || '<p class="empty-note">Aucune période saisie</p>';

    const ferieRows = d.feries.map((f,i)=>`
      <div class="period-row ${f.manual?'manual-row':'ferie-row'}">
        <span>${f.manual?'📌':'🏛'}</span>
        <span class="p-dates">${fmt(f.date)} – ${f.label}</span>
        <button class="del-btn" onclick="delFerie('${s.id}',${i})">✕</button>
      </div>`).join('') || '<p class="empty-note">Aucun jour férié saisi</p>';

    const card = document.createElement('div');
    card.className = 'card';
    card.innerHTML = `
      <div class="card-head">
        <div class="avatar" style="background:linear-gradient(135deg,${s.color}cc,${s.color})">${s.name[0].toUpperCase()}</div>
        <div class="staff-meta">
          <h3>${s.name}</h3>
          <p>${countryName(s.country)} · ${s.maxDays}j de congés/an</p>
        </div>
        <div class="card-actions">
          <button class="icon-btn" title="Modifier le staff" onclick="openEditStaff('${s.id}')">✏️</button>
          <button class="icon-btn" title="Supprimer le staff" onclick="removeStaff('${s.id}')">🗑</button>
        </div>
      </div>
      <div class="quota-area">
        <div class="q-label"><span>Congés payés</span><span class="q-count">${usedCP} / ${s.maxDays} jours ouvrés</span></div>
        <div class="bar"><div class="bar-fill" style="width:${pct}%;background:linear-gradient(90deg,${s.color}99,${s.color})"></div></div>
        ${badgeHtml(usedCP, s.maxDays)}
      </div>
      <div class="periods-area">
        <div class="sec-title">Périodes de congés payés</div>
        ${cpRows}
        <div class="add-row">
          <button class="add-btn add-cp" onclick="openAddCP('${s.id}')">＋ Ajouter</button>
        </div>
        <div class="sec-title">Jours fériés</div>
        ${ferieRows}
        <div class="add-row">
          <button class="add-btn add-ferie" onclick="openAddFerie('${s.id}')">📅 Par pays</button>
          <button class="add-btn add-manual" onclick="openAddManual('${s.id}')">📌 Manuel</button>
        </div>
      </div>`;
    grid.appendChild(card);
  });

  // Add staff button
  const addCard = document.createElement('div');
  addCard.className = 'add-staff-card';
  addCard.onclick = () => openAddStaff();
  addCard.innerHTML = `<span class="add-staff-icon">＋</span><span>Ajouter un·e collaborateur·rice</span>`;
  grid.appendChild(addCard);
}

// CALENDAR
// ═══════════════════════════════════════════
const MONTHS_FR=['Janvier','Février','Mars','Avril','Mai','Juin','Juillet','Août','Septembre','Octobre','Novembre','Décembre'];

function buildDayMap() {
  const map = {};
  state.staff.forEach((s,idx) => {
    const d = getSD(s.id);
    d.cp.forEach(p => {
      let c=new Date(p.start+'T00:00:00'),end=new Date(p.end+'T00:00:00');
      while(c<=end){
        const k=fmtISO(c);
        if(!map[k]) map[k]={cp:[],feries:[]};
        map[k].cp.push({color:s.color,idx});
        c.setDate(c.getDate()+1);
      }
    });
    d.feries.forEach(f=>{
      if(!map[f.date]) map[f.date]={cp:[],feries:[]};
      map[f.date].feries.push({color:s.color,label:f.label,idx});
    });
  });
  return map;
}

function fmtISO(d){ return d.toISOString().split('T')[0]; }

function renderCalendar() {
  const grid = document.getElementById('monthsGrid');
  const legendEl = document.getElementById('calLegend');
  if(!grid) return;
  grid.innerHTML='';

  const todayStr = fmtISO(new Date());
  const dm = buildDayMap();

  // Legend
  legendEl.innerHTML = state.staff.map(s=>`
    <div class="leg-item">
      <span class="leg-dot" style="background:${s.color}"></span>${s.name} (CP)
    </div>
    <div class="leg-item">
      <span class="leg-dot" style="background:transparent;border:2.5px solid ${s.color};box-sizing:border-box;"></span>${s.name} (férié)
    </div>`).join('');

  for(let m=0;m<12;m++){
    const first=new Date(year,m,1), last=new Date(year,m+1,0);
    let dow=first.getDay()-1; if(dow<0) dow=6;

    let html=`<div class="m-name">${MONTHS_FR[m]}</div><div class="days-row">`;
    ['L','M','M','J','V','S','D'].forEach(d=>{html+=`<div class="dh">${d}</div>`;});
    for(let i=0;i<dow;i++) html+='<div class="dc"></div>';

    for(let day=1;day<=last.getDate();day++){
      const ds=`${year}-${String(m+1).padStart(2,'0')}-${String(day).padStart(2,'0')}`;
      const info=dm[ds]||{cp:[],feries:[]};
      const d2=new Date(ds).getDay();
      const isWknd=d2===0||d2===6;
      let cls='dc', bg='', title='';

      if(ds===todayStr) cls+=' today';
      if(isWknd) cls+=' wknd';

      // CP coloring: blend colors or single
      if(info.cp.length===1){
        bg=`background:${info.cp[0].color}DD; color:#fff; font-weight:600;`;
      } else if(info.cp.length>1){
        const stops=info.cp.map((c,i)=>`${c.color}EE ${i*100/info.cp.length}% ${(i+1)*100/info.cp.length}%`).join(',');
        bg=`background:linear-gradient(135deg,${stops}); color:#fff; font-weight:600;`;
      }

      // Ferie rings: one ring per staff, colored, empty center
      let ferieStyle = '';
      if(info.feries.length === 1){
        const fc = info.feries[0].color;
        ferieStyle = `box-shadow:0 0 0 2.5px ${fc} inset;`;
        title = info.feries[0].label;
      } else if(info.feries.length >= 2){
        // Two rings: inner + outer via outline + box-shadow
        const fc0 = info.feries[0].color;
        const fc1 = info.feries[1].color;
        ferieStyle = `box-shadow:0 0 0 2.5px ${fc0} inset, 0 0 0 5px ${fc1}44 inset;`;
        title = info.feries.map(f=>f.label).join(' / ');
      }

      html+=`<div class="${cls}" style="${bg}${ferieStyle}" title="${title}">${day}</div>`;
    }
    html+='</div>';
    const block=document.createElement('div');
    block.className='month-block'; block.innerHTML=html;
    grid.appendChild(block);
  }
}

// ═══════════════════════════════════════════
// MODAL ENGINE
// ═══════════════════════════════════════════
function openModal(){ document.getElementById('overlay').classList.add('open'); }
function closeModal(){ document.getElementById('overlay').classList.remove('open'); activeModal=null; errHide(); }

function setModal({title,sub,info,body,actions}){
  document.getElementById('mTitle').textContent=title||'';
  document.getElementById('mSub').textContent=sub||'';
  const infoEl=document.getElementById('mInfo');
  if(info){ infoEl.innerHTML=info; infoEl.style.display='block'; } else infoEl.style.display='none';
  document.getElementById('mBody').innerHTML=body||'';
  document.getElementById('mActions').innerHTML=actions||'';
  errHide();
  openModal();
}

// ═══════════════════════════════════════════
// ADD CP
// ═══════════════════════════════════════════
function openAddCP(staffId){
  const s=state.staff.find(x=>x.id===staffId);
  const d=getSD(staffId);
  const fs=ferieSet(staffId);
  const used=totalCP(d.cp,fs), left=s.maxDays-used;
  activeModal={type:'cp',staffId};
  setModal({
    title:`Congés payés – ${s.name}`,
    sub:'Sélectionnez la période (week-ends exclus automatiquement)',
    info:`<strong>${left} jour(s) ouvré(s)</strong> restant(s) sur ${s.maxDays} <span style="opacity:0.75;font-size:11.5px">(week-ends & jours fériés exclus automatiquement)</span>`,
    body:`
      <div class="fg"><label>Date de début</label><input type="date" id="cpStart"></div>
      <div class="fg"><label>Date de fin</label><input type="date" id="cpEnd"></div>`,
    actions:`
      <button class="btn-cancel" onclick="closeModal()">Annuler</button>
      <button class="btn-ok" style="background:${s.color}" onclick="confirmCP()">Ajouter</button>`
  });
}

async function confirmCP(){
  const {staffId}=activeModal;
  const s=state.staff.find(x=>x.id===staffId);
  const d=getSD(staffId);
  const start=document.getElementById('cpStart').value;
  const end=document.getElementById('cpEnd').value;
  if(!start||!end) return errShow('Veuillez renseigner les deux dates.');
  if(end<start) return errShow('La date de fin doit être après le début.');
  const fs=ferieSet(staffId);
  const days=workdays(start,end,fs);
  if(days===0) return errShow('Aucun jour ouvré dans cette période (tout est week-end ou jour férié).');
  const used=totalCP(d.cp,fs);
  if(used+days>s.maxDays) return errShow(`Quota dépassé ! Il reste ${s.maxDays-used}j ouvré(s) (hors fériés).`);
  d.cp.push({start,end});
  d.cp.sort((a,b)=>a.start.localeCompare(b.start));
  closeModal(); await save(); renderAll();
}

async function delCP(staffId,idx){
  if(!confirm('Supprimer cette période ?')) return;
  getSD(staffId).cp.splice(idx,1);
  await save(); renderAll();
}

// ═══════════════════════════════════════════
// ADD FERIE (par pays)
// ═══════════════════════════════════════════
function openAddFerie(staffId){
  const s=state.staff.find(x=>x.id===staffId);
  activeModal={type:'ferie',staffId};
  const countryOpts=COUNTRY_LIST.filter(c=>c.code!=='OTHER').map(c=>`<option value="${c.code}" ${c.code===s.country?'selected':''}>${c.name}</option>`).join('');
  setModal({
    title:`Jours fériés par pays – ${s.name}`,
    sub:'Sélectionnez un pays puis cochez les jours à ajouter',
    body:`
      <div class="fg">
        <label>Pays</label>
        <select id="ferieCountry" onchange="refreshHolList('${staffId}')">${countryOpts}</select>
      </div>
      <div class="fg" id="holGroup">
        <label>Jours fériés disponibles</label>
        <div class="hol-list" id="holList"></div>
      </div>`,
    actions:`
      <button class="btn-cancel" onclick="closeModal()">Annuler</button>
      <button class="btn-ok" style="background:var(--sky)" onclick="confirmFerie()">Ajouter la sélection</button>`
  });
  refreshHolList(staffId);
}

function refreshHolList(staffId){
  const code=document.getElementById('ferieCountry').value;
  const d=getSD(staffId);
  const existing=d.feries.map(f=>f.date);
  const holidays=getPublicHolidays(code, year);
  const list=document.getElementById('holList');
  if(!holidays.length){
    list.innerHTML='<p style="padding:10px 13px;font-size:12.5px;color:var(--text-soft)">Aucun férié disponible pour ce pays/année.</p>';
    return;
  }
  list.innerHTML=holidays.map(h=>{
    const done=existing.includes(h.date);
    return `<label class="hol-opt ${done?'disabled':''}">
      <input type="checkbox" value="${h.date}" data-label="${h.label}" ${done?'disabled checked':''}>
      <span class="hol-name">${h.label}</span>
      <span class="hol-date">${fmt(h.date)}</span>
    </label>`;
  }).join('');
}

async function confirmFerie(){
  const {staffId}=activeModal;
  const d=getSD(staffId);
  const checked=[...document.querySelectorAll('#holList input[type=checkbox]:checked:not(:disabled)')];
  if(!checked.length) return errShow('Cochez au moins un jour férié.');
  checked.forEach(cb=>{
    if(!d.feries.find(f=>f.date===cb.value)){
      d.feries.push({date:cb.value,label:cb.dataset.label,manual:false});
    }
  });
  d.feries.sort((a,b)=>a.date.localeCompare(b.date));
  closeModal(); await save(); renderAll();
}

// ═══════════════════════════════════════════
// ADD FERIE MANUEL
// ═══════════════════════════════════════════
function openAddManual(staffId){
  const s=state.staff.find(x=>x.id===staffId);
  activeModal={type:'manual',staffId};
  setModal({
    title:`Jour férié manuel – ${s.name}`,
    sub:'Pour les fériés régionaux ou spécifiques (ex: São João à Porto)',
    body:`
      <div class="fg"><label>Date</label><input type="date" id="manDate"></div>
      <div class="fg"><label>Nom du jour</label><input type="text" id="manLabel" placeholder="ex: São João (Porto)"></div>`,
    actions:`
      <button class="btn-cancel" onclick="closeModal()">Annuler</button>
      <button class="btn-ok" style="background:#7B5EA7" onclick="confirmManual()">Ajouter</button>`
  });
}

async function confirmManual(){
  const {staffId}=activeModal;
  const d=getSD(staffId);
  const date=document.getElementById('manDate').value;
  const label=document.getElementById('manLabel').value.trim();
  if(!date) return errShow('Veuillez sélectionner une date.');
  if(!label) return errShow('Veuillez saisir un nom pour ce jour.');
  if(d.feries.find(f=>f.date===date)) return errShow('Un jour férié est déjà saisi pour cette date.');
  d.feries.push({date,label,manual:true});
  d.feries.sort((a,b)=>a.date.localeCompare(b.date));
  closeModal(); await save(); renderAll();
}

async function delFerie(staffId,idx){
  if(!confirm('Supprimer ce jour férié ?')) return;
  getSD(staffId).feries.splice(idx,1);
  await save(); renderAll();
}

// ═══════════════════════════════════════════
// ADD STAFF
// ═══════════════════════════════════════════
function openAddStaff(){
  activeModal={type:'addStaff'};
  const countryOpts=COUNTRY_LIST.map(c=>`<option value="${c.code}">${c.name}</option>`).join('');
  const colorSwatches=PALETTE.map(c=>`<div class="color-swatch" style="background:${c}" data-color="${c}" onclick="selectColor(this)"></div>`).join('');
  setModal({
    title:'Ajouter un·e collaborateur·rice',
    sub:'Renseignez les informations du nouveau membre de l\'équipe',
    body:`
      <div class="fg-row">
        <div class="fg"><label>Prénom</label><input type="text" id="sName" placeholder="ex: Sarah"></div>
        <div class="fg"><label>Jours CP / an</label><input type="number" id="sMax" value="15" min="1" max="60"></div>
      </div>
      <div class="fg">
        <label>Pays de résidence</label>
        <select id="sCountry">${countryOpts}</select>
      </div>
      <div class="fg">
        <label>Couleur</label>
        <div class="color-grid" id="colorGrid">${colorSwatches}</div>
        <input type="hidden" id="sColor" value="${PALETTE[0]}">
      </div>`,
    actions:`
      <button class="btn-cancel" onclick="closeModal()">Annuler</button>
      <button class="btn-ok" style="background:var(--earth)" onclick="confirmAddStaff()">Ajouter</button>`
  });
  // select first color
  document.querySelector('.color-swatch').classList.add('selected');
}

function selectColor(el){
  document.querySelectorAll('.color-swatch').forEach(s=>s.classList.remove('selected'));
  el.classList.add('selected');
  document.getElementById('sColor').value=el.dataset.color;
}

async function confirmAddStaff(){
  const name=document.getElementById('sName').value.trim();
  const country=document.getElementById('sCountry').value;
  const color=document.getElementById('sColor').value;
  const maxDays=parseInt(document.getElementById('sMax').value)||15;
  if(!name) return errShow('Veuillez saisir un prénom.');
  const id=name.toLowerCase().replace(/\s+/g,'_')+uid();
  state.staff.push({id,name,country,color,maxDays});
  closeModal(); await save(); renderAll();
}

// ═══════════════════════════════════════════
// EDIT STAFF
// ═══════════════════════════════════════════
function openEditStaff(staffId){
  const s=state.staff.find(x=>x.id===staffId);
  activeModal={type:'editStaff',staffId};
  const countryOpts=COUNTRY_LIST.map(c=>`<option value="${c.code}" ${c.code===s.country?'selected':''}>${c.name}</option>`).join('');
  const colorSwatches=PALETTE.map(c=>`<div class="color-swatch ${c===s.color?'selected':''}" style="background:${c}" data-color="${c}" onclick="selectColor(this)"></div>`).join('');
  setModal({
    title:`Modifier – ${s.name}`,
    sub:'Modifiez les informations de ce membre',
    body:`
      <div class="fg-row">
        <div class="fg"><label>Prénom</label><input type="text" id="sName" value="${s.name}"></div>
        <div class="fg"><label>Jours CP / an</label><input type="number" id="sMax" value="${s.maxDays}" min="1" max="60"></div>
      </div>
      <div class="fg">
        <label>Pays de résidence</label>
        <select id="sCountry">${countryOpts}</select>
      </div>
      <div class="fg">
        <label>Couleur</label>
        <div class="color-grid" id="colorGrid">${colorSwatches}</div>
        <input type="hidden" id="sColor" value="${s.color}">
      </div>`,
    actions:`
      <button class="btn-cancel" onclick="closeModal()">Annuler</button>
      <button class="btn-ok" style="background:var(--earth)" onclick="confirmEditStaff('${staffId}')">Enregistrer</button>`
  });
}

async function confirmEditStaff(staffId){
  const s=state.staff.find(x=>x.id===staffId);
  const name=document.getElementById('sName').value.trim();
  if(!name) return errShow('Le prénom est requis.');
  s.name=name;
  s.country=document.getElementById('sCountry').value;
  s.color=document.getElementById('sColor').value;
  s.maxDays=parseInt(document.getElementById('sMax').value)||15;
  closeModal(); await save(); renderAll();
}

async function removeStaff(staffId){
  const s=state.staff.find(x=>x.id===staffId);
  if(!confirm(`Supprimer ${s.name} et toutes ses données ?`)) return;
  state.staff=state.staff.filter(x=>x.id!==staffId);
  delete state.data[staffId];
  await save(); renderAll();
}
